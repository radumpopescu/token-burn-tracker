<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Burn Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@4.7.0/dist/apexcharts.min.js"></script>
    <style>
        :root {
            --bg: #07121f;
            --panel: #0f1e31;
            --panel-soft: #132844;
            --text: #f3f6fb;
            --muted: #8ea6c4;
            --line: #213756;
            --accent: #ff7a18;
            --accent-2: #31c4ff;
            --ok: #38d39f;
            --error: #ff6a6a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "SF Pro Display", "Segoe UI", system-ui, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(49,196,255,0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(255,122,24,0.18), transparent 24%),
                linear-gradient(180deg, #07121f 0%, #08111d 100%);
            color: var(--text);
            min-height: 100vh;
        }
        .page { max-width: 1200px; margin: 0 auto; padding: 24px 24px 104px; }

        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; gap: 16px;
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-left h1 { margin: 0; font-size: 1.4rem; letter-spacing: -0.02em; }
        .status-pill {
            display: inline-flex; align-items: center; min-height: 32px;
            gap: 10px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--line);
            background: rgba(255,255,255,0.02); font-size: 0.78rem; color: var(--muted);
        }
        .status-dock {
            position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
            z-index: 20; display: flex; justify-content: center; width: max-content;
            max-width: calc(100vw - 32px);
        }
        .status-pill.is-refreshing {
            border-color: rgba(49,196,255,0.32);
            box-shadow: 0 0 0 1px rgba(49,196,255,0.06) inset;
        }
        .status-pill.has-error {
            border-color: rgba(255,106,106,0.45);
            color: #ffd0d0;
        }
        .status-spinner {
            --refresh-progress: 0;
            position: relative; width: 12px; height: 12px; flex-shrink: 0; border-radius: 50%;
            background: conic-gradient(var(--accent-2) calc(var(--refresh-progress) * 1%), rgba(255,255,255,0.12) 0);
            animation: spin 1.2s linear infinite;
        }
        .status-spinner::after {
            content: ""; position: absolute; inset: 2px; border-radius: 50%; background: var(--panel);
        }
        .status-copy { white-space: nowrap; }
        .status-sep {
            width: 1px; height: 12px; background: rgba(255,255,255,0.08); flex-shrink: 0;
        }
        .link-btn {
            display: inline-flex; align-items: center; justify-content: center;
            min-height: 36px; padding: 0 14px; text-decoration: none; color: var(--text);
            border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,0.02); font-size: 0.85rem;
        }
        .link-btn.primary {
            background: linear-gradient(135deg, var(--accent), #ff9a3d);
            border-color: rgba(255,122,24,0.55); color: #180d03; font-weight: 700;
        }

        /* Usage groups */
        .usage-group { margin-bottom: 16px; }
        .usage-group-title {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--muted); margin: 0 0 8px; font-weight: 600;
        }
        .usage-group-subtitle {
            font-size: 0.72rem; color: var(--muted); margin: -4px 0 8px; font-weight: 400;
        }
        .usage-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px;
        }
        .usage-item {
            background: rgba(15,30,49,0.86); border: 1px solid var(--line);
            border-radius: 12px; padding: 12px 14px;
        }
        .usage-item-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px;
        }
        .usage-item-label { font-size: 0.82rem; color: var(--text); font-weight: 500; }
        .usage-item-provider {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--muted); background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 5px;
        }
        .usage-item-pct { font-size: 0.78rem; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
        .usage-bar-track { height: 7px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
        .usage-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
        .usage-bar-fill.low { background: var(--accent-2); }
        .usage-bar-fill.mid { background: var(--accent); }
        .usage-bar-fill.high { background: var(--error); }
        .usage-item-footer {
            display: flex; justify-content: space-between; margin-top: 5px;
            font-size: 0.7rem; color: var(--muted);
        }
        .no-data-msg { color: var(--muted); padding: 16px; text-align: center; font-size: 0.9rem; }

        /* Chart section */
        .chart-section {
            background: rgba(15,30,49,0.86); border: 1px solid var(--line);
            border-radius: 16px; padding: 16px; margin-bottom: 20px;
        }
        .chart-section h2 { margin: 0 0 10px; font-size: 0.95rem; }

        /* Period toggles */
        .period-toggles {
            display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px;
        }
        .period-chip {
            padding: 5px 12px; border-radius: 8px; font-size: 0.78rem;
            cursor: pointer; user-select: none; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: var(--muted); transition: all 0.15s;
        }
        .period-chip.active {
            background: linear-gradient(135deg, var(--accent), #ff9a3d);
            border-color: rgba(255,122,24,0.5); color: #1a0f05; font-weight: 700;
        }

        /* Series toggle chips */
        .series-toggles {
            display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 12px;
        }
        .series-group {
            min-width: 0; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            background: rgba(255,255,255,0.03); padding: 10px;
        }
        .series-group-header {
            display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px;
        }
        .series-group-title {
            display: flex; flex-direction: column; gap: 2px; min-width: 0;
        }
        .series-group-title strong {
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
        }
        .series-group-title span {
            font-size: 0.72rem; color: var(--muted);
        }
        .series-group-toggle {
            display: inline-flex; align-items: center; justify-content: center; white-space: nowrap;
            min-height: 28px; padding: 0 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04); color: var(--text); font-size: 0.72rem; cursor: pointer;
        }
        .series-group-chips {
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .series-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 8px; font-size: 0.75rem;
            cursor: pointer; user-select: none; border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); color: var(--text); transition: all 0.15s;
        }
        .series-chip.off {
            opacity: 0.35; background: transparent;
        }
        .series-chip .dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }

        .chart-wrap { position: relative; min-height: 340px; }

        /* ApexCharts dark overrides */
        .apexcharts-tooltip {
            background: #132844 !important;
            border: 1px solid #213756 !important;
            color: #f3f6fb !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
            border-radius: 8px !important;
        }
        .apexcharts-tooltip-title {
            background: #0f1e31 !important;
            border-bottom: 1px solid #213756 !important;
            color: #8ea6c4 !important;
            font-size: 0.78rem !important;
        }
        .apexcharts-tooltip-series-group {
            padding: 4px 8px !important;
        }
        .apexcharts-xaxistooltip {
            background: #132844 !important;
            border: 1px solid #213756 !important;
            color: #8ea6c4 !important;
        }
        .apexcharts-xaxistooltip-bottom::after,
        .apexcharts-xaxistooltip-bottom::before {
            border-bottom-color: #132844 !important;
        }
        .apexcharts-menu {
            background: #132844 !important;
            border: 1px solid #213756 !important;
        }
        .apexcharts-menu-item:hover {
            background: #1a3555 !important;
        }
        .apexcharts-toolbar {
            top: -6px !important;
        }
        .apexcharts-reset-icon, .apexcharts-zoom-icon, .apexcharts-zoomin-icon,
        .apexcharts-zoomout-icon, .apexcharts-pan-icon, .apexcharts-menu-icon {
            color: #8ea6c4 !important;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 760px) {
            .page { padding: 14px 12px 32px; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .topbar-left { flex-wrap: wrap; }
            .usage-grid { grid-template-columns: 1fr; }
            .series-toggles { grid-template-columns: 1fr; }
            .status-pill { width: 100%; flex-wrap: wrap; }
            .status-dock { left: 12px; right: 12px; bottom: 12px; transform: none; width: auto; max-width: none; }
            .status-sep { display: none; }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="topbar">
            <div class="topbar-left">
                <h1>Token Burn</h1>
            </div>
            <a class="link-btn primary" href="/settings">Settings</a>
        </section>

        <div id="usage-container">
            <div class="no-data-msg">Loading usage data...</div>
        </div>

        <section class="chart-section">
            <div class="series-group-header">
                <div class="series-group-title">
                    <strong>5h windows</strong>
                    <span>Primary and short-session limits</span>
                </div>
                <button type="button" class="series-group-toggle" id="session-group-toggle" onclick="toggleGroup('session')">Hide all</button>
            </div>
            <div class="period-toggles" id="session-period-toggles"></div>
            <div class="series-group-chips" id="session-series-toggles"></div>
            <div class="chart-wrap">
                <div id="session-chart"></div>
                <div class="no-data-msg" id="session-chart-empty" style="display:none;">No 5h window history yet.</div>
            </div>
        </section>

        <section class="chart-section">
            <div class="series-group-header">
                <div class="series-group-title">
                    <strong>7d windows</strong>
                    <span>Secondary and weekly limits</span>
                </div>
                <button type="button" class="series-group-toggle" id="weekly-group-toggle" onclick="toggleGroup('weekly')">Hide all</button>
            </div>
            <div class="period-toggles" id="weekly-period-toggles"></div>
            <div class="series-group-chips" id="weekly-series-toggles"></div>
            <div class="chart-wrap">
                <div id="weekly-chart"></div>
                <div class="no-data-msg" id="weekly-chart-empty" style="display:none;">No 7d window history yet.</div>
            </div>
        </section>
    </div>
    <div class="status-dock">
        <span class="status-pill" id="refresh-status-pill" aria-live="polite">
            <span class="status-spinner" id="refresh-spinner" aria-hidden="true"></span>
            <span class="status-copy" id="last-updated-label">Loading latest status...</span>
            <span class="status-sep" aria-hidden="true"></span>
            <span class="status-copy" id="next-refresh-label">Scheduling refresh...</span>
        </span>
    </div>

    <script>
    const chartColors = ["#ff7a18","#31c4ff","#7ce38b","#c38cff","#ffd166","#ff6b6b","#7bdff2","#b8f2e6"];
    const dashboardStorageKey = "token-burn.dashboard.preferences.v3";
    const fallbackRefreshSeconds = 30;
    const refreshBufferMs = 3000;
    const chartStepMs = 60 * 1000;
    const chartPeriodOptions = {
        session: [
            { value: "1h", label: "1h" },
            { value: "5h", label: "5h" },
            { value: "24h", label: "24h" },
            { value: "7d", label: "7d" },
        ],
        weekly: [
            { value: "24h", label: "24h" },
            { value: "7d", label: "7d" },
            { value: "30d", label: "30d" },
            { value: "90d", label: "90d" },
        ],
    };
    const chartConfigs = {
        session: {
            chartId: "session-chart",
            emptyId: "session-chart-empty",
            periodsId: "session-period-toggles",
            controlsId: "session-series-toggles",
            toggleId: "session-group-toggle",
            emptyMessage: "No 5h window history yet.",
        },
        weekly: {
            chartId: "weekly-chart",
            emptyId: "weekly-chart-empty",
            periodsId: "weekly-period-toggles",
            controlsId: "weekly-series-toggles",
            toggleId: "weekly-group-toggle",
            emptyMessage: "No 7d window history yet.",
        },
    };
    let apexCharts = { session: null, weekly: null };
    let allDatasets = { session: [], weekly: [] };
    let selectedChartPeriods = { session: "5h", weekly: "7d" };
    let hiddenSeriesKeys = new Set();
    let pollIntervalSeconds = Math.max(60, Number("{{ poll_interval_seconds }}") || 60);
    let activeLoadToken = 0;
    let refreshTimeoutId = null;
    let refreshTickerId = null;
    let nextRefreshAt = null;
    let latestRefreshSourceAt = null;
    let latestCheckedAt = null;
    let pendingBackendRefreshRetry = false;
    let pendingBackendRefreshRetries = 0;
    let currentRangeEndAt = null;
    let latestRefreshError = "";
    let isRefreshing = false;
    let metricLabels = {};

    function buildQuery() {
        const p = new URLSearchParams();
        p.set("provider", "all");
        p.set("period", requestedBackendPeriod());
        return p.toString();
    }

    function getStoredDashboardPreferences() {
        try {
            const raw = window.localStorage.getItem(dashboardStorageKey);
            if (!raw) return {};
            const parsed = JSON.parse(raw);
            return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
            return {};
        }
    }
    function saveDashboardPreferences() {
        try {
            window.localStorage.setItem(dashboardStorageKey, JSON.stringify({
                chartPeriods: selectedChartPeriods,
                hiddenSeriesKeys: Array.from(hiddenSeriesKeys),
            }));
        } catch {}
    }
    function applyStoredDashboardPreferences() {
        const stored = getStoredDashboardPreferences();
        if (stored.chartPeriods && typeof stored.chartPeriods === "object") {
            Object.keys(chartPeriodOptions).forEach((groupKey) => {
                const period = normalizeChartPeriod(groupKey, stored.chartPeriods[groupKey]);
                if (period) selectedChartPeriods[groupKey] = period;
            });
        }
        if (Array.isArray(stored.hiddenSeriesKeys)) {
            hiddenSeriesKeys = new Set(stored.hiddenSeriesKeys.filter(value => typeof value === "string"));
        }
    }
    function normalizeChartPeriod(groupKey, period) {
        return chartPeriodOptions[groupKey].some(option => option.value === period) ? period : null;
    }
    function chartPeriodToRangeMs(period) {
        switch (period) {
            case "1h": return 60 * 60 * 1000;
            case "5h": return 5 * 60 * 60 * 1000;
            case "24h": return 24 * 60 * 60 * 1000;
            case "7d": return 7 * 24 * 60 * 60 * 1000;
            case "30d": return 30 * 24 * 60 * 60 * 1000;
            case "90d": return 90 * 24 * 60 * 60 * 1000;
            default: return 7 * 24 * 60 * 60 * 1000;
        }
    }
    function chartPeriodToBackendPeriod(period) {
        if (period === "1h") return "1h";
        if (period === "5h" || period === "24h") return "24h";
        return period;
    }
    function requestedBackendPeriod() {
        const order = ["1h", "24h", "7d", "30d", "90d"];
        const requested = Object.values(selectedChartPeriods)
            .map(chartPeriodToBackendPeriod)
            .sort((a, b) => order.indexOf(a) - order.indexOf(b));
        return requested.length ? requested[requested.length - 1] : "7d";
    }
    function renderPeriodChips(groupKey) {
        const container = document.getElementById(chartConfigs[groupKey].periodsId);
        container.innerHTML = chartPeriodOptions[groupKey].map((option) => {
            const active = selectedChartPeriods[groupKey] === option.value ? "active" : "";
            return `<span class="period-chip ${active}" onclick="setChartPeriod('${groupKey}', '${option.value}')">${option.label}</span>`;
        }).join("");
    }
    function renderAllPeriodChips() {
        Object.keys(chartPeriodOptions).forEach(renderPeriodChips);
    }
    function setChartPeriod(groupKey, period) {
        const normalized = normalizeChartPeriod(groupKey, period);
        if (!normalized || selectedChartPeriods[groupKey] === normalized) return;
        selectedChartPeriods[groupKey] = normalized;
        saveDashboardPreferences();
        renderPeriodChips(groupKey);
        loadData(true);
    }

    function safeDate(v) { return v ? new Date(v) : null; }
    function fmtDate(v) {
        const d = safeDate(v);
        if (!d || Number.isNaN(d.getTime())) return "\u2014";
        return new Intl.DateTimeFormat(undefined, { dateStyle: "medium", timeStyle: "short" }).format(d);
    }
    function chartTimeValue(v) {
        const d = safeDate(v);
        if (!d || Number.isNaN(d.getTime())) return null;
        return d.getTime();
    }
    function fmtRelative(v) {
        const d = safeDate(v);
        if (!d || Number.isNaN(d.getTime())) return "";
        const sec = Math.round((d.getTime() - Date.now()) / 1000);
        const abs = Math.abs(sec);
        if (abs < 60) return sec >= 0 ? "in under a minute" : "just now";
        const ranges = [["day",86400],["hour",3600],["minute",60]];
        const fmt = new Intl.RelativeTimeFormat(undefined, { numeric: "auto" });
        for (const [unit, size] of ranges) {
            if (abs >= size || unit === "minute") return fmt.format(Math.round(sec / size), unit);
        }
        return "";
    }
    function fmtDuration(v) {
        const d = safeDate(v);
        if (!d || Number.isNaN(d.getTime())) return "";
        const abs = Math.abs(Math.round((d.getTime() - Date.now()) / 1000));
        if (abs < 60) return "< 1 min";
        if (abs < 3600) return `${Math.round(abs / 60)} min`;
        const h = Math.floor(abs / 3600);
        const m = Math.round((abs % 3600) / 60);
        return m > 0 ? `${h} hr ${m} min` : `${h} hr`;
    }
    function fmtShortDuration(totalSeconds) {
        const sec = Math.max(0, Math.round(totalSeconds));
        if (sec < 60) return `${sec}s`;
        if (sec < 3600) {
            const min = Math.floor(sec / 60);
            const rem = sec % 60;
            return min < 10 && rem ? `${min}m ${rem}s` : `${min}m`;
        }
        const hr = Math.floor(sec / 3600);
        const min = Math.floor((sec % 3600) / 60);
        return min ? `${hr}h ${min}m` : `${hr}h`;
    }
    function fmtElapsedFromNow(v) {
        const d = safeDate(v);
        if (!d || Number.isNaN(d.getTime())) return "Waiting for first update";
        const elapsedSeconds = Math.max(0, Math.round((Date.now() - d.getTime()) / 1000));
        if (elapsedSeconds < 5) return "Updated just now";
        return `Updated ${fmtShortDuration(elapsedSeconds)} ago`;
    }
    function fmtNextRefresh() {
        if (isRefreshing) return "Refreshing now";
        if (!nextRefreshAt) return "Scheduling refresh...";
        const remainingSeconds = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
        if (remainingSeconds <= 1) return "Refreshing momentarily";
        return `Next refresh in ${fmtShortDuration(remainingSeconds)}`;
    }
    function getLatestRefreshSource(latest, states) {
        const candidates = [];
        Object.values(states || {}).forEach((state) => {
            if (state && state.last_success_at) candidates.push(state.last_success_at);
            else if (state && state.last_checked_at) candidates.push(state.last_checked_at);
        });
        Object.values(latest || {}).forEach((snapshot) => {
            if (snapshot && snapshot.recorded_at) candidates.push(snapshot.recorded_at);
        });
        return candidates
            .map(safeDate)
            .filter((date) => date && !Number.isNaN(date.getTime()))
            .sort((a, b) => b.getTime() - a.getTime())[0] || null;
    }
    function getLatestCheckedAt(states) {
        return Object.values(states || {})
            .map(state => safeDate(state && state.last_checked_at))
            .filter((date) => date && !Number.isNaN(date.getTime()))
            .sort((a, b) => b.getTime() - a.getTime())[0] || null;
    }
    function updateRefreshStatus() {
        const pill = document.getElementById("refresh-status-pill");
        const spinner = document.getElementById("refresh-spinner");
        const updatedLabel = document.getElementById("last-updated-label");
        const nextLabel = document.getElementById("next-refresh-label");
        const cycleMs = (latestCheckedAt ? pollIntervalSeconds : fallbackRefreshSeconds) * 1000;
        const cycleStartAt = nextRefreshAt ? nextRefreshAt - cycleMs : null;
        const progress = (cycleStartAt !== null && nextRefreshAt)
            ? Math.max(0, Math.min(100, ((Date.now() - cycleStartAt) / cycleMs) * 100))
            : 0;

        pill.classList.toggle("is-refreshing", isRefreshing);
        pill.classList.toggle("has-error", Boolean(latestRefreshError));
        spinner.style.setProperty("--refresh-progress", progress.toFixed(1));
        updatedLabel.textContent = latestRefreshError || fmtElapsedFromNow(latestRefreshSourceAt);
        nextLabel.textContent = fmtNextRefresh();
    }
    function startRefreshTicker() {
        if (refreshTickerId !== null) clearInterval(refreshTickerId);
        refreshTickerId = window.setInterval(updateRefreshStatus, 1000);
    }
    function scheduleNextRefresh() {
        if (refreshTimeoutId !== null) clearTimeout(refreshTimeoutId);
        if (latestCheckedAt) {
            const intervalMs = pollIntervalSeconds * 1000;
            let scheduledAt = latestCheckedAt.getTime() + intervalMs + refreshBufferMs;
            if (pendingBackendRefreshRetry) {
                scheduledAt = Date.now() + Math.min(5000, Math.max(1500, refreshBufferMs));
            } else {
                while (scheduledAt <= Date.now()) scheduledAt += intervalMs;
            }
            nextRefreshAt = scheduledAt;
            const delayMs = Math.max(1000, nextRefreshAt - Date.now());
            refreshTimeoutId = window.setTimeout(() => loadData(false), delayMs);
        } else {
            nextRefreshAt = Date.now() + fallbackRefreshSeconds * 1000;
            refreshTimeoutId = window.setTimeout(() => loadData(false), fallbackRefreshSeconds * 1000);
        }
        updateRefreshStatus();
    }
    function barClass(pct) { return pct >= 80 ? "high" : pct >= 50 ? "mid" : "low"; }
    function metricPointValue(p) {
        if (p.percent_value !== null && p.percent_value !== undefined) return p.percent_value;
        if (p.used_value !== null && p.used_value !== undefined) return p.used_value;
        return null;
    }

    function classifyMetric(provider, metricKey, label, resets_at) {
        const key = (metricKey || "").toLowerCase();
        const l = (label || "").toLowerCase();

        // Use reset time to determine group: < 24h = session, otherwise weekly
        if (resets_at) {
            const resetDate = safeDate(resets_at);
            if (resetDate && !Number.isNaN(resetDate.getTime())) {
                const hoursUntilReset = (resetDate.getTime() - Date.now()) / 3600000;
                if (hoursUntilReset <= 24) return { group: "session", order: 0, title: "Current session", subtitle: "Short-term rate limits (resets within 24 hours)" };
                return { group: "weekly", order: 1, title: "Weekly limits", subtitle: "Longer rolling window" };
            }
        }

        // Fallback to label-based classification
        if (key.includes("five_hour") || key.includes("primary") || l.includes("5 hour") || l.includes("5h") || l.includes("primary")) return { group: "session", order: 0, title: "Current session", subtitle: "Short-term rate limits (resets within 24 hours)" };
        if (key.includes("seven_day") || key.includes("secondary") || l.includes("7 day") || l.includes("weekly") || l.includes("week") || l.includes("secondary")) return { group: "weekly", order: 1, title: "Weekly limits", subtitle: "Longer rolling window" };
        if (l.includes("extra") || l.includes("credit") || l.includes("monthly")) return { group: "credits", order: 2, title: "Credits / extras", subtitle: "Monthly usage credits and add-ons" };
        if (l.includes("message") || l.includes("cloud") || l.includes("local")) return { group: "credits", order: 2, title: "Credits / extras", subtitle: "Message and credit counts" };
        return { group: "other", order: 3, title: "Other limits", subtitle: "" };
    }

    function minuteFloor(ts) {
        return Math.floor(ts / chartStepMs) * chartStepMs;
    }
    function minuteCeil(ts) {
        return Math.ceil(ts / chartStepMs) * chartStepMs;
    }
    function dedupePoints(points) {
        const deduped = [];
        points.forEach((point) => {
            if (!deduped.length || deduped[deduped.length - 1].x !== point.x) {
                deduped.push(point);
            } else {
                deduped[deduped.length - 1] = point;
            }
        });
        return deduped;
    }
    function densifySeriesPoints(points, startTs, endTs) {
        if (!points.length || startTs >= endTs) return [];
        const sorted = points
            .slice()
            .sort((a, b) => a.x - b.x)
            .filter(point => point.x <= endTs);
        if (!sorted.length) return [];

        let carry = null;
        let pointIndex = 0;
        let firstDenseTs = startTs;
        while (pointIndex < sorted.length && sorted[pointIndex].x <= startTs) {
            carry = sorted[pointIndex];
            pointIndex += 1;
        }
        if (!carry) {
            if (pointIndex >= sorted.length) return [];
            carry = sorted[pointIndex];
            firstDenseTs = carry.x;
            pointIndex += 1;
        }

        const dense = [{ x: firstDenseTs, y: carry.y }];
        for (let ts = minuteCeil(firstDenseTs); ts <= minuteFloor(endTs); ts += chartStepMs) {
            while (pointIndex < sorted.length && sorted[pointIndex].x <= ts) {
                carry = sorted[pointIndex];
                pointIndex += 1;
            }
            dense.push({ x: ts, y: carry.y });
        }
        while (pointIndex < sorted.length && sorted[pointIndex].x <= endTs) {
            carry = sorted[pointIndex];
            pointIndex += 1;
        }
        dense.push({ x: endTs, y: carry.y });
        return dedupePoints(dense);
    }

    function renderUsage(latest) {
        const container = document.getElementById("usage-container");
        const items = [];
        Object.entries(latest).forEach(([provider, snapshot]) => {
            (snapshot.metrics || []).forEach((m) => {
                let pct = m.percent_value;
                if ((pct === null || pct === undefined) && m.used_value !== null && m.limit_value)
                    pct = (m.used_value / m.limit_value) * 100;
                if (pct === null || pct === undefined || Number.isNaN(pct)) return;
                const cls = classifyMetric(provider, m.metric_key, m.label, m.resets_at);
                const displayLabel = metricLabels[m.metric_key] || m.label;
                items.push({ provider, label: displayLabel, pct: Math.max(0, Math.min(100, pct)),
                    resets_at: m.resets_at, used: m.used_value, limit: m.limit_value, unit: m.unit,
                    ...cls });
            });
        });
        if (!items.length) {
            container.innerHTML = '<div class="no-data-msg">No usage data yet. Configure providers in Settings.</div>';
            return;
        }
        const groups = {};
        items.forEach(item => {
            if (!groups[item.group]) groups[item.group] = { title: item.title, subtitle: item.subtitle, order: item.order, items: [] };
            groups[item.group].items.push(item);
        });
        container.innerHTML = Object.values(groups).sort((a, b) => a.order - b.order).map(g => {
            const grid = g.items.map(item => {
                const reset = item.resets_at ? `Resets ${fmtRelative(item.resets_at)} (${fmtDuration(item.resets_at)})` : "";
                const amt = (item.used !== null && item.used !== undefined && item.limit)
                    ? `${Number.isInteger(item.used) ? item.used : item.used.toFixed(1)}/${Number.isInteger(item.limit) ? item.limit : item.limit.toFixed(1)}${item.unit && item.unit !== "percent" ? " " + item.unit : ""}`
                    : "";
                return `<div class="usage-item">
                    <div class="usage-item-header"><span class="usage-item-label">${item.label}</span><span class="usage-item-provider">${item.provider}</span></div>
                    <div class="usage-item-pct">${item.pct.toFixed(1)}% used</div>
                    <div class="usage-bar-track"><div class="usage-bar-fill ${barClass(item.pct)}" style="width:${item.pct}%"></div></div>
                    <div class="usage-item-footer"><span>${amt}</span><span>${reset}</span></div>
                </div>`;
            }).join("");
            return `<div class="usage-group">
                <h3 class="usage-group-title">${g.title}</h3>
                ${g.subtitle ? `<p class="usage-group-subtitle">${g.subtitle}</p>` : ""}
                <div class="usage-grid">${grid}</div>
            </div>`;
        }).join("");
    }

    function datasetsForGroup(groupKey) {
        return allDatasets[groupKey] || [];
    }
    function renderSeriesChips(groupKey) {
        const config = chartConfigs[groupKey];
        const container = document.getElementById(config.controlsId);
        const toggleButton = document.getElementById(config.toggleId);
        const datasets = datasetsForGroup(groupKey);
        const visibleCount = datasets.filter(ds => !hiddenSeriesKeys.has(ds.key)).length;
        toggleButton.textContent = datasets.length && visibleCount === 0 ? "Show all" : "Hide all";
        container.innerHTML = datasets.map((dataset) => {
            const isOff = hiddenSeriesKeys.has(dataset.key);
            return `<span class="series-chip ${isOff ? "off" : ""}" data-key="${dataset.key}" onclick='toggleSeries(${JSON.stringify(dataset.key)})'>
                <span class="dot" style="background:${dataset.color}"></span>${dataset.label}
            </span>`;
        }).join("");
    }
    function renderAllSeriesChips() {
        Object.keys(chartConfigs).forEach(renderSeriesChips);
    }

    function toggleSeries(key) {
        if (hiddenSeriesKeys.has(key)) hiddenSeriesKeys.delete(key);
        else hiddenSeriesKeys.add(key);
        saveDashboardPreferences();
        updateChartVisibility();
        renderAllSeriesChips();
    }
    function toggleGroup(groupKey) {
        const datasets = datasetsForGroup(groupKey);
        if (!datasets.length) return;
        const shouldShowAll = datasets.every(ds => hiddenSeriesKeys.has(ds.key));
        datasets.forEach((dataset) => {
            if (shouldShowAll) hiddenSeriesKeys.delete(dataset.key);
            else hiddenSeriesKeys.add(dataset.key);
        });
        saveDashboardPreferences();
        updateChartVisibility();
        renderAllSeriesChips();
    }

    function updateChartVisibility() {
        Object.entries(apexCharts).forEach(([groupKey, chart]) => {
            if (!chart) return;
            datasetsForGroup(groupKey).forEach((dataset) => {
                if (hiddenSeriesKeys.has(dataset.key)) chart.hideSeries(dataset.label);
                else chart.showSeries(dataset.label);
            });
        });
    }

    function chartGroupForSeries(metricKey, label) {
        const classification = classifyMetric("", metricKey, label, null);
        return classification.group === "session" || classification.group === "weekly"
            ? classification.group
            : null;
    }
    function buildDatasets(series, rangeEndTs) {
        const grouped = { session: [], weekly: [] };
        series.forEach((item, index) => {
            const groupKey = chartGroupForSeries(item.metric_key, item.label);
            if (!groupKey) return;
            const rangeStartTs = rangeEndTs - chartPeriodToRangeMs(selectedChartPeriods[groupKey]);
            const rawPoints = item.points
                .map(point => {
                    const x = chartTimeValue(point.recorded_at);
                    const y = metricPointValue(point);
                    return (x !== null && y !== null) ? { x, y } : null;
                })
                .filter(Boolean);
            const densePoints = densifySeriesPoints(rawPoints, rangeStartTs, rangeEndTs);
            if (!densePoints.length) return;
            grouped[groupKey].push({
                key: `${item.provider}:${item.metric_key}`,
                label: `${item.provider.toUpperCase()} \u00b7 ${metricLabels[item.metric_key] || item.label}`,
                color: chartColors[index % chartColors.length],
                data: densePoints,
            });
        });
        return grouped;
    }
    function buildChartOptions(datasets, xMin, xMax) {
        return {
            series: datasets.map(dataset => ({
                name: dataset.label,
                data: dataset.data,
            })),
            chart: {
                type: "area",
                height: 340,
                background: "transparent",
                fontFamily: "SF Pro Display, Segoe UI, system-ui, sans-serif",
                foreColor: "#8ea6c4",
                toolbar: {
                    show: true,
                    tools: {
                        download: false,
                        selection: false,
                        zoom: true,
                        zoomin: false,
                        zoomout: false,
                        pan: false,
                        reset: true,
                    },
                },
                zoom: { enabled: true },
                animations: {
                    enabled: false,
                },
                selection: { enabled: true },
            },
            colors: datasets.map(dataset => dataset.color),
            stroke: {
                curve: "stepline",
                width: 2.5,
            },
            fill: {
                type: "gradient",
                gradient: {
                    shadeIntensity: 1,
                    opacityFrom: 0.25,
                    opacityTo: 0.02,
                    stops: [0, 100],
                },
            },
            markers: {
                size: 0,
                hover: { size: 5, sizeOffset: 2 },
            },
            xaxis: {
                type: "datetime",
                min: xMin || undefined,
                max: xMax || undefined,
                labels: {
                    style: { colors: "#8ea6c4", fontSize: "11px" },
                    datetimeUTC: false,
                },
                axisBorder: { color: "#213756" },
                axisTicks: { color: "#213756" },
                crosshairs: {
                    stroke: { color: "#31c4ff", width: 1, dashArray: 3 },
                },
            },
            yaxis: {
                min: 0,
                max: 100,
                tickAmount: 5,
                labels: {
                    style: { colors: "#8ea6c4", fontSize: "11px" },
                    formatter: (val) => val.toFixed(0) + "%",
                },
            },
            grid: {
                borderColor: "rgba(255,255,255,0.06)",
                strokeDashArray: 3,
                xaxis: { lines: { show: false } },
                yaxis: { lines: { show: true } },
            },
            tooltip: {
                theme: "dark",
                shared: true,
                intersect: false,
                x: {
                    format: "MMM dd, yyyy HH:mm",
                },
                y: {
                    formatter: (val) => val !== null && val !== undefined ? val.toFixed(1) + "%" : "—",
                },
                marker: { show: true },
            },
            legend: { show: false },
            dataLabels: { enabled: false },
            theme: { mode: "dark" },
        };
    }
    function destroyChart(groupKey) {
        if (apexCharts[groupKey]) {
            apexCharts[groupKey].destroy();
            apexCharts[groupKey] = null;
        }
    }
    function renderChartGroup(groupKey, rangeEndTs) {
        const config = chartConfigs[groupKey];
        const datasets = datasetsForGroup(groupKey);
        const xMin = rangeEndTs - chartPeriodToRangeMs(selectedChartPeriods[groupKey]);
        const xMax = rangeEndTs;
        const el = document.getElementById(config.chartId);
        const empty = document.getElementById(config.emptyId);

        destroyChart(groupKey);
        el.innerHTML = "";

        if (!datasets.length) {
            empty.textContent = config.emptyMessage;
            empty.style.display = "block";
            return;
        }

        empty.style.display = "none";
        apexCharts[groupKey] = new ApexCharts(el, buildChartOptions(datasets, xMin, xMax));
        apexCharts[groupKey].render().then(() => {
            datasets.forEach((dataset) => {
                if (!apexCharts[groupKey]) return;
                if (hiddenSeriesKeys.has(dataset.key)) {
                    apexCharts[groupKey].hideSeries(dataset.label);
                }
            });
        });
    }
    function renderCharts(series) {
        const rangeEndTs = chartTimeValue(currentRangeEndAt) || Date.now();
        allDatasets = buildDatasets(series, rangeEndTs);
        Object.keys(chartConfigs).forEach((groupKey) => {
            renderChartGroup(groupKey, rangeEndTs);
        });
        renderAllSeriesChips();
    }

    async function loadData(pushState = false) {
        const loadToken = ++activeLoadToken;
        const query = buildQuery();
        if (pushState) history.replaceState({}, "", "/");
        if (refreshTimeoutId !== null) clearTimeout(refreshTimeoutId);
        nextRefreshAt = null;
        latestRefreshError = "";
        isRefreshing = true;
        updateRefreshStatus();

        try {
            const res = await fetch(`/api/history?${query}`);
            if (!res.ok) throw new Error(`Refresh failed (${res.status})`);
            const data = await res.json();
            if (loadToken !== activeLoadToken) return;
            pollIntervalSeconds = Math.max(60, Number(data.poll_interval_seconds) || pollIntervalSeconds);
            metricLabels = data.metric_labels || {};
            currentRangeEndAt = data.filters ? data.filters.end_at : null;
            latestRefreshSourceAt = getLatestRefreshSource(data.latest, data.states);
            const previousCheckedAt = latestCheckedAt;
            const nextCheckedAt = getLatestCheckedAt(data.states);
            const previousCheckedAtMs = previousCheckedAt ? previousCheckedAt.getTime() : null;
            const nextCheckedAtMs = nextCheckedAt ? nextCheckedAt.getTime() : null;
            const backendAdvanced = nextCheckedAtMs !== null && (previousCheckedAtMs === null || nextCheckedAtMs > previousCheckedAtMs);
            const expectedBackendRefreshAt = nextCheckedAtMs !== null
                ? nextCheckedAtMs + (pollIntervalSeconds * 1000) + refreshBufferMs
                : null;
            const backendLooksOverdue = Boolean(
                previousCheckedAtMs !== null &&
                nextCheckedAtMs !== null &&
                nextCheckedAtMs === previousCheckedAtMs &&
                expectedBackendRefreshAt !== null &&
                Date.now() >= expectedBackendRefreshAt
            );

            latestCheckedAt = nextCheckedAt;
            pendingBackendRefreshRetry = backendLooksOverdue && pendingBackendRefreshRetries < 3;
            if (backendAdvanced || !backendLooksOverdue) {
                pendingBackendRefreshRetries = 0;
            } else if (pendingBackendRefreshRetry) {
                pendingBackendRefreshRetries += 1;
            }
            renderUsage(data.latest);
            renderCharts(data.series);
        } catch (error) {
            if (loadToken !== activeLoadToken) return;
            latestRefreshError = error instanceof Error ? error.message : "Refresh failed";
        } finally {
            if (loadToken !== activeLoadToken) return;
            isRefreshing = false;
            scheduleNextRefresh();
        }
    }

    applyStoredDashboardPreferences();
    renderAllPeriodChips();
    startRefreshTicker();
    updateRefreshStatus();
    loadData(true);
    </script>
</body>
</html>
